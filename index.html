<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智标领航 - 招投标AI智能体</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">
    <style>
        /* ==================== 基础样式重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        /* ==================== CSS变量定义 ==================== */
        :root {
            --primary-color: #2563EB;
            --primary-hover: #1d4ed8;
            --primary-light: #dbeafe;
            --secondary-color: #00BFA5;
            --secondary-hover: #00a896;
            --secondary-light: #e0f2f1;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --success-color: #10b981;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --sidebar-width: 240px;
            --header-height: 60px;
        }

        /* ==================== 登录页面样式 ==================== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563EB 0%, #00BFA5 100%);
            padding: 20px;
        }

        .login-box {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo i {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .login-logo h1 {
            font-size: 28px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .login-logo p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 5px;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .login-tab:hover {
            color: var(--primary-color);
        }

        .login-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .login-form-group {
            margin-bottom: 20px;
        }

        .login-label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }

        .login-input-wrapper {
            position: relative;
        }

        .login-input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .login-input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all 0.3s;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .login-input::placeholder {
            color: var(--text-muted);
        }

        .login-code-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            padding: 6px 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-code-btn:hover {
            background: var(--primary-hover);
        }

        .login-code-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* ==================== 主应用布局 ==================== */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header i {
            font-size: 28px;
            color: var(--primary-color);
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .sidebar-nav {
            flex: 1;
            padding: 15px 0;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 20px;
        }

        .nav-section-title {
            padding: 8px 20px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            gap: 12px;
            font-size: 14px;
        }

        .nav-item:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary-color);
            border-right: 3px solid var(--primary-color);
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .nav-badge {
            margin-left: auto;
            padding: 2px 8px;
            background: var(--danger-color);
            color: white;
            border-radius: 10px;
            font-size: 11px;
        }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .user-role {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            display: flex;
            flex-direction: column;
        }

        .main-header {
            height: var(--header-height);
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .breadcrumb-separator {
            color: var(--text-muted);
        }

        .breadcrumb-current {
            color: var(--text-primary);
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .header-icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .header-icon-btn .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* ==================== 通用组件样式 ==================== */
        /* 卡片 */
        .card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-body {
            padding: 20px;
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: white;
        }

        .btn-secondary:hover {
            background: var(--secondary-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--bg-secondary);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-lg {
            padding: 14px 28px;
            font-size: 16px;
        }

        /* 输入框 */
        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            transition: all 0.2s;
        }

        .textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        /* 标签 */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
        }

        .tag-primary {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .tag-success {
            background: #d1fae5;
            color: #059669;
        }

        .tag-warning {
            background: #fef3c7;
            color: #d97706;
        }

        .tag-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-icon.primary {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .stat-icon.secondary {
            background: var(--secondary-light);
            color: var(--secondary-color);
        }

        .stat-icon.warning {
            background: #fef3c7;
            color: #d97706;
        }

        .stat-icon.success {
            background: #d1fae5;
            color: #059669;
        }

        .stat-content h3 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-content p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .table th {
            background: var(--bg-secondary);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 13px;
        }

        .table td {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .table tbody tr:hover {
            background: var(--bg-secondary);
        }

        /* 进度条 */
        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .progress-fill.primary {
            background: var(--primary-color);
        }

        .progress-fill.secondary {
            background: var(--secondary-color);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 64px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow: auto;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--bg-secondary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background: var(--primary-light);
        }

        .upload-area i {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 16px;
        }

        .upload-area h4 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .upload-area p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 文件列表 */
        .file-list {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            gap: 12px;
        }

        .file-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .file-size {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ==================== 页面特定样式 ==================== */
        /* 仪表盘 */
        .dashboard-header {
            margin-bottom: 24px;
        }

        .dashboard-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .dashboard-header p {
            color: var(--text-secondary);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .quick-action-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .quick-action-card i {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        .quick-action-card h4 {
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .quick-action-card p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 最近活动 */
        .activity-list {
            list-style: none;
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 14px;
            flex-shrink: 0;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .activity-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 标书写作 */
        .writing-layout {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 20px;
            height: calc(100vh - var(--header-height) - 48px);
        }

        .template-panel,
        .editor-panel,
        .preview-panel {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 14px;
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .template-item {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-item:hover {
            border-color: var(--primary-color);
        }

        .template-item.selected {
            border-color: var(--primary-color);
            background: var(--primary-light);
        }

        .template-item h5 {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .template-item p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .editor-toolbar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: var(--bg-secondary);
        }

        .editor-content {
            flex: 1;
            padding: 16px;
        }

        .editor-textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            font-size: 14px;
            line-height: 1.8;
            outline: none;
        }

        .preview-content {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: var(--radius-md);
            min-height: 300px;
        }

        /* 检查报告 */
        .check-result {
            margin-top: 20px;
        }

        .check-score {
            text-align: center;
            padding: 30px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(var(--secondary-color) 0deg, var(--secondary-color) calc(var(--score) * 3.6deg), var(--bg-tertiary) calc(var(--score) * 3.6deg));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            position: relative;
        }

        .score-inner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            color: var(--secondary-color);
        }

        .check-items {
            list-style: none;
        }

        .check-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        .check-item-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .check-item-icon.pass {
            background: #d1fae5;
            color: #059669;
        }

        .check-item-icon.fail {
            background: #fee2e2;
            color: #dc2626;
        }

        .check-item-icon.warn {
            background: #fef3c7;
            color: #d97706;
        }

        /* 项目管理 */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.2s;
        }

        .project-card:hover {
            box-shadow: var(--shadow-md);
        }

        .project-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .project-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .project-body {
            padding: 16px;
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }

        .project-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .project-progress {
            margin-bottom: 16px;
        }

        .project-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .project-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        /* 企业资信库 */
        .company-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .company-tab {
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .company-tab:hover {
            border-color: var(--primary-color);
        }

        .company-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .certificate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .certificate-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
        }

        .certificate-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .certificate-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
        }

        .certificate-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .certificate-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* 解析结果 */
        .parse-result {
            margin-top: 20px;
        }

        .parse-section {
            margin-bottom: 20px;
        }

        .parse-section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .parse-section-title i {
            color: var(--primary-color);
        }

        .parse-content {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.8;
        }

        .parse-list {
            list-style: none;
        }

        .parse-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        .parse-list li:last-child {
            border-bottom: none;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .writing-layout {
                grid-template-columns: 1fr;
                height: auto;
            }

            .template-panel,
            .editor-panel,
            .preview-panel {
                min-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .quick-actions {
                grid-template-columns: 1fr;
            }
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        /* 工具类 */
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .mt-20 { margin-top: 20px; }
        .mb-20 { margin-bottom: 20px; }
        .flex { display: flex; }
        .flex-1 { flex: 1; }
        .gap-10 { gap: 10px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // ==================== 数据存储 ====================
        const Storage = {
            get: (key, defaultValue = null) => {
                try {
                    const value = localStorage.getItem(`bid-ai-${key}`);
                    return value ? JSON.parse(value) : defaultValue;
                } catch {
                    return defaultValue;
                }
            },
            set: (key, value) => {
                localStorage.setItem(`bid-ai-${key}`, JSON.stringify(value));
            }
        };

        // ==================== 登录页面 ====================
        const LoginPage = ({ onLogin }) => {
            const [loginType, setLoginType] = useState('phone');
            const [phone, setPhone] = useState('');
            const [code, setCode] = useState('');
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [codeSent, setCodeSent] = useState(false);
            const [countdown, setCountdown] = useState(0);

            useEffect(() => {
                if (countdown > 0) {
                    const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
                    return () => clearTimeout(timer);
                } else {
                    setCodeSent(false);
                }
            }, [countdown]);

            const sendCode = () => {
                if (!phone || phone.length !== 11) {
                    alert('请输入正确的手机号');
                    return;
                }
                setCodeSent(true);
                setCountdown(60);
                alert('验证码已发送');
            };

            const handleLogin = () => {
                if (loginType === 'phone') {
                    if (!phone || !code) {
                        alert('请填写完整信息');
                        return;
                    }
                } else {
                    if (!username || !password) {
                        alert('请填写完整信息');
                        return;
                    }
                }
                Storage.set('user', { name: username || '用户', phone: phone, loginTime: new Date().toISOString() });
                Storage.set('isLoggedIn', true);
                onLogin();
            };

            return (
                <div className="login-container">
                    <div className="login-box fade-in">
                        <div className="login-logo">
                            <i className="fas fa-file-contract"></i>
                            <h1>智标领航</h1>
                            <p>招投标AI智能助手</p>
                        </div>

                        <div className="login-tabs">
                            <div
                                className={`login-tab ${loginType === 'phone' ? 'active' : ''}`}
                                onClick={() => setLoginType('phone')}
                            >
                                <i className="fas fa-mobile-alt"></i> 手机登录
                            </div>
                            <div
                                className={`login-tab ${loginType === 'account' ? 'active' : ''}`}
                                onClick={() => setLoginType('account')}
                            >
                                <i className="fas fa-user"></i> 账号登录
                            </div>
                        </div>

                        {loginType === 'phone' ? (
                            <>
                                <div className="login-form-group">
                                    <label className="login-label">手机号</label>
                                    <div className="login-input-wrapper">
                                        <i className="fas fa-mobile-alt"></i>
                                        <input
                                            type="tel"
                                            className="login-input"
                                            placeholder="请输入手机号"
                                            value={phone}
                                            onChange={(e) => setPhone(e.target.value)}
                                            maxLength={11}
                                        />
                                    </div>
                                </div>
                                <div className="login-form-group">
                                    <label className="login-label">验证码</label>
                                    <div className="login-input-wrapper">
                                        <i className="fas fa-shield-alt"></i>
                                        <input
                                            type="text"
                                            className="login-input"
                                            placeholder="请输入验证码"
                                            value={code}
                                            onChange={(e) => setCode(e.target.value)}
                                            maxLength={6}
                                            style={{ paddingRight: '110px' }}
                                        />
                                        <button
                                            className="login-code-btn"
                                            onClick={sendCode}
                                            disabled={codeSent}
                                        >
                                            {codeSent ? `${countdown}s` : '获取验证码'}
                                        </button>
                                    </div>
                                </div>
                            </>
                        ) : (
                            <>
                                <div className="login-form-group">
                                    <label className="login-label">账号</label>
                                    <div className="login-input-wrapper">
                                        <i className="fas fa-user"></i>
                                        <input
                                            type="text"
                                            className="login-input"
                                            placeholder="请输入账号"
                                            value={username}
                                            onChange={(e) => setUsername(e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="login-form-group">
                                    <label className="login-label">密码</label>
                                    <div className="login-input-wrapper">
                                        <i className="fas fa-lock"></i>
                                        <input
                                            type="password"
                                            className="login-input"
                                            placeholder="请输入密码"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                        />
                                    </div>
                                </div>
                            </>
                        )}

                        <button className="login-btn" onClick={handleLogin}>
                            <i className="fas fa-sign-in-alt"></i> 登录
                        </button>

                        <div className="login-footer">
                            登录即表示同意《用户协议》和《隐私政策》
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== 侧边栏 ====================
        const Sidebar = ({ currentPage, onNavigate, user }) => {
            const navItems = [
                { id: 'dashboard', icon: 'fa-home', label: '首页', section: 'main' },
                { id: 'parse', icon: 'fa-file-alt', label: '招标文件解析', section: 'work' },
                { id: 'writing', icon: 'fa-edit', label: '标书写作', section: 'work' },
                { id: 'check', icon: 'fa-check-circle', label: '标书检查', section: 'work' },
                { id: 'projects', icon: 'fa-folder', label: '项目管理', section: 'manage' },
                { id: 'company', icon: 'fa-building', label: '企业资信库', section: 'manage' },
            ];

            const sections = {
                main: '主要功能',
                work: '工作模块',
                manage: '数据管理'
            };

            let currentSection = '';
            const groupedItems = navItems.reduce((acc, item) => {
                if (!acc[item.section]) acc[item.section] = [];
                acc[item.section].push(item);
                return acc;
            }, {});

            return (
                <div className="sidebar">
                    <div className="sidebar-header">
                        <i className="fas fa-file-contract"></i>
                        <h2>智标领航</h2>
                    </div>

                    <nav className="sidebar-nav">
                        {Object.entries(groupedItems).map(([section, items]) => (
                            <div key={section} className="nav-section">
                                <div className="nav-section-title">{sections[section]}</div>
                                {items.map(item => (
                                    <div
                                        key={item.id}
                                        className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                                        onClick={() => onNavigate(item.id)}
                                    >
                                        <i className={`fas ${item.icon}`}></i>
                                        <span>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </nav>

                    <div className="sidebar-footer">
                        <div className="user-info">
                            <div className="user-avatar">
                                <i className="fas fa-user"></i>
                            </div>
                            <div className="user-details">
                                <div className="user-name">{user?.name || '用户'}</div>
                                <div className="user-role">管理员</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== 头部 ====================
        const Header = ({ currentPage }) => {
            const pageNames = {
                dashboard: '首页',
                parse: '招标文件解析',
                writing: '标书写作',
                check: '标书检查',
                projects: '项目管理',
                company: '企业资信库'
            };

            return (
                <header className="main-header">
                    <div className="header-left">
                        <div className="breadcrumb">
                            <i className="fas fa-home"></i>
                            <span className="breadcrumb-separator">/</span>
                            <span className="breadcrumb-current">{pageNames[currentPage]}</span>
                        </div>
                    </div>
                    <div className="header-right">
                        <button className="header-icon-btn">
                            <i className="fas fa-bell"></i>
                            <span className="badge">3</span>
                        </button>
                        <button className="header-icon-btn">
                            <i className="fas fa-question-circle"></i>
                        </button>
                    </div>
                </header>
            );
        };

        // ==================== 首页仪表盘 ====================
        const Dashboard = ({ onNavigate }) => {
            const stats = [
                { icon: 'fa-folder', value: 12, label: '进行中项目', color: 'primary' },
                { icon: 'fa-file-alt', value: 28, label: '已解析文件', color: 'secondary' },
                { icon: 'fa-check-circle', value: 15, label: '已完成标书', color: 'success' },
                { icon: 'fa-clock', value: 5, label: '待处理任务', color: 'warning' }
            ];

            const quickActions = [
                { icon: 'fa-file-alt', title: '解析招标文件', desc: '上传并智能解析', page: 'parse' },
                { icon: 'fa-edit', title: '编写标书', desc: 'AI辅助写作', page: 'writing' },
                { icon: 'fa-check-circle', title: '检查标书', desc: '智能合规检查', page: 'check' },
                { icon: 'fa-folder-plus', title: '新建项目', desc: '创建新项目', page: 'projects' }
            ];

            const activities = [
                { icon: 'fa-file-alt', title: '解析了招标文件：XX市政工程招标文件.pdf', time: '10分钟前' },
                { icon: 'fa-edit', title: '完成了标书编写：XX项目技术方案', time: '1小时前' },
                { icon: 'fa-check-circle', title: '标书检查通过：XX项目商务标', time: '2小时前' },
                { icon: 'fa-folder', title: '创建了新项目：XX道路改造工程', time: '昨天' }
            ];

            return (
                <div className="fade-in">
                    <div className="dashboard-header">
                        <h1>欢迎回来，用户</h1>
                        <p>今天是 {new Date().toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                    </div>

                    <div className="stats-grid">
                        {stats.map((stat, index) => (
                            <div key={index} className="stat-card">
                                <div className={`stat-icon ${stat.color}`}>
                                    <i className={`fas ${stat.icon}`}></i>
                                </div>
                                <div className="stat-content">
                                    <h3>{stat.value}</h3>
                                    <p>{stat.label}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="quick-actions">
                        {quickActions.map((action, index) => (
                            <div
                                key={index}
                                className="quick-action-card"
                                onClick={() => onNavigate(action.page)}
                            >
                                <i className={`fas ${action.icon}`}></i>
                                <h4>{action.title}</h4>
                                <p>{action.desc}</p>
                            </div>
                        ))}
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <span className="card-title">最近活动</span>
                            <button className="btn btn-sm btn-outline">查看全部</button>
                        </div>
                        <div className="card-body">
                            <ul className="activity-list">
                                {activities.map((activity, index) => (
                                    <li key={index} className="activity-item">
                                        <div className="activity-icon">
                                            <i className={`fas ${activity.icon}`}></i>
                                        </div>
                                        <div className="activity-content">
                                            <div className="activity-title">{activity.title}</div>
                                            <div className="activity-time">{activity.time}</div>
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== 招标文件解析 ====================
        const ParsePage = () => {
            const [files, setFiles] = useState([]);
            const [parsing, setParsing] = useState(false);
            const [parseResult, setParseResult] = useState(null);

            const handleFileSelect = (e) => {
                const selectedFiles = Array.from(e.target.files);
                const newFiles = selectedFiles.map(file => ({
                    id: Date.now() + Math.random(),
                    name: file.name,
                    size: (file.size / 1024).toFixed(2) + ' KB',
                    status: 'pending'
                }));
                setFiles([...files, ...newFiles]);
            };

            const parseFile = (file) => {
                setParsing(true);
                setTimeout(() => {
                    setParseResult({
                        fileName: file.name,
                        projectInfo: {
                            projectName: 'XX市政道路改造工程',
                            tenderUnit: 'XX市城市建设投资集团有限公司',
                            budget: '5000万元',
                            deadline: '2024年3月15日 17:00',
                            location: 'XX市高新区'
                        },
                        requirements: [
                            '具有市政公用工程施工总承包三级及以上资质',
                            '项目经理具有二级建造师及以上资格',
                            '近三年承担过类似工程业绩',
                            '财务状况良好，具有履约能力'
                        ],
                        technical: [
                            { section: '技术方案', weight: '40%', requirements: '施工组织设计、技术措施' },
                            { section: '商务报价', weight: '50%', requirements: '工程量清单报价' },
                            { section: '企业资信', weight: '10%', requirements: '资质、业绩、信誉' }
                        ],
                        keyDates: [
                            { event: '招标文件发布', date: '2024年2月1日' },
                            { event: '答疑截止', date: '2024年2月20日' },
                            { event: '投标截止', date: '2024年3月15日' },
                            { event: '开标时间', date: '2024年3月16日' }
                        ]
                    });
                    setParsing(false);
                    setFiles(files.map(f => f.id === file.id ? { ...f, status: 'done' } : f));
                }, 2000);
            };

            const removeFile = (fileId) => {
                setFiles(files.filter(f => f.id !== fileId));
            };

            return (
                <div className="fade-in">
                    <div className="card mb-20">
                        <div className="card-header">
                            <span className="card-title">

                                            value={newProject.name}
                                            onChange={(e) => setNewProject({ ...newProject, name: e.target.value })}
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">项目类型</label>
                                        <select
                                            className="select"
                                            value={newProject.type}
                                            onChange={(e) => setNewProject({ ...newProject, type: e.target.value })}
                                        >
                                            <option value="工程">工程</option>
                                            <option value="信息化">信息化</option>
                                            <option value="服务">服务</option>
                                            <option value="采购">采购</option>
                                        </select>
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">截止日期</label>
                                        <input
                                            type="date"
                                            className="input"
                                            value={newProject.deadline}
                                            onChange={(e) => setNewProject({ ...newProject, deadline: e.target.value })}
                                        />
                                    </div>
                                </div>
                                <div className="modal-footer">
                                    <button className="btn btn-outline" onClick={() => setShowModal(false)}>
                                        取消
                                    </button>
                                    <button className="btn btn-primary" onClick={createProject}>
                                        <i className="fas fa-check"></i> 创建
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== 企业资信库 ====================
        const CompanyPage = () => {
            const [activeTab, setActiveTab] = useState('info');
            const [companyInfo] = useState({
                name: 'XX建设集团有限公司',
                creditCode: '91110000XXXXXXXXXX',
                legalPerson: '张三',
                registeredCapital: '5000万元',
                address: 'XX市高新区科技路100号',
                phone: '010-12345678',
                email: 'info@example.com'
            });

            const [certificates] = useState([
                { id: 1, name: '营业执照', number: '91110000XXXXXXXXXX', expireDate: '2025-12-31', status: 'valid' },
                { id: 2, name: '建筑业企业资质证书', number: 'D111000XXX', expireDate: '2024-06-30', status: 'expiring' },
                { id: 3, name: '安全生产许可证', number: '(京)JZ安许证字[2023]000001', expireDate: '2026-01-15', status: 'valid' },
                { id: 4, name: 'ISO9001认证', number: 'ISO9001-2023', expireDate: '2026-03-20', status: 'valid' },
                { id: 5, name: '环境管理体系认证', number: 'ISO14001-2023', expireDate: '2024-12-01', status: 'expiring' }
            ]);

            const [performances] = useState([
                { id: 1, project: 'XX道路改造工程', amount: '3000万元', year: '2023', owner: 'XX城投' },
                { id: 2, project: 'XX桥梁建设工程', amount: '4500万元', year: '2022', owner: 'XX交通局' },
                { id: 3, project: 'XX公园景观工程', amount: '1200万元', year: '2022', owner: 'XX园林局' }
            ]);

            const certStatusMap = {
                valid: { label: '有效', class: 'tag-success' },
                expiring: { label: '即将到期', class: 'tag-warning' },
                expired: { label: '已过期', class: 'tag-danger' }
            };

            return (
                <div className="fade-in">
                    <div className="company-tabs">
                        <button
                            className={`company-tab ${activeTab === 'info' ? 'active' : ''}`}
                            onClick={() => setActiveTab('info')}
                        >
                            <i className="fas fa-building"></i> 企业信息
                        </button>
                        <button
                            className={`company-tab ${activeTab === 'cert' ? 'active' : ''}`}
                            onClick={() => setActiveTab('cert')}
                        >
                            <i className="fas fa-certificate"></i> 资质证书
                        </button>
                        <button
                            className={`company-tab ${activeTab === 'perf' ? 'active' : ''}`}
                            onClick={() => setActiveTab('perf')}
                        >
                            <i className="fas fa-chart-line"></i> 业绩记录
                        </button>
                    </div>

                    {activeTab === 'info' && (
                        <div className="card">
                            <div className="card-header">
                                <span className="card-title">
                                    <i className="fas fa-building"></i> 企业基本信息
                                </span>
                                <button className="btn btn-sm btn-outline">
                                    <i className="fas fa-edit"></i> 编辑
                                </button>
                            </div>
                            <div className="card-body">
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }}>
                                    <div className="input-group">
                                        <label className="input-label">企业名称</label>
                                        <input type="text" className="input" value={companyInfo.name} readOnly />
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">统一社会信用代码</label>
                                        <input type="text" className="input" value={companyInfo.creditCode} readOnly />
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">法定代表人</label>
                                        <input type="text" className="input" value={companyInfo.legalPerson} readOnly />
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">注册资本</label>
                                        <input type="text" className="input" value={companyInfo.registeredCapital} readOnly />
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">联系电话</label>
                                        <input type="text" className="input" value={companyInfo.phone} readOnly />
                                    </div>
                                    <div className="input-group">
                                        <label className="input-label">电子邮箱</label>
                                        <input type="text" className="input" value={companyInfo.email} readOnly />
                                    </div>
                                </div>
                                <div className="input-group mt-20">
                                    <label className="input-label">注册地址</label>
                                    <input type="text" className="input" value={companyInfo.address} readOnly />
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'cert' && (
                        <div className="card">
                            <div className="card-header">
                                <span className="card-title">
                                    <i className="fas fa-certificate"></i> 资质证书管理
                                </span>
                                <button className="btn btn-sm btn-primary">
                                    <i className="fas fa-plus"></i> 添加证书
                                </button>
                            </div>
                            <div className="card-body">
                                <div className="certificate-grid">
                                    {certificates.map(cert => (
                                        <div key={cert.id} className="certificate-card">
                                            <div className="certificate-header">
                                                <div className="certificate-icon">
                                                    <i className="fas fa-file-certificate"></i>
                                                </div>
                                                <div>
                                                    <div className="certificate-title">{cert.name}</div>
                                                    <span className={`tag ${certStatusMap[cert.status].class}`}>
                                                        {certStatusMap[cert.status].label}
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="certificate-meta">
                                                <div>证书编号：{cert.number}</div>
                                                <div>有效期至：{cert.expireDate}</div>
                                            </div>
                                            <div className="flex gap-10">
                                                <button className="btn btn-sm btn-outline flex-1">
                                                    <i className="fas fa-eye"></i> 查看
                                                </button>
                                                <button className="btn btn-sm btn-outline flex-1">
                                                    <i className="fas fa-edit"></i> 编辑
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'perf' && (
                        <div className="card">
                            <div className="card-header">
                                <span className="card-title">
                                    <i className="fas fa-chart-line"></i> 业绩记录
                                </span>
                                <button className="btn btn-sm btn-primary">
                                    <i className="fas fa-plus"></i> 添加业绩
                                </button>
                            </div>
                            <div className="card-body">
                                <div className="table-container">
                                    <table className="table">
                                        <thead>
                                            <tr>
                                                <th>项目名称</th>
                                                <th>合同金额</th>
                                                <th>完工年份</th>
                                                <th>业主单位</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {performances.map(perf => (
                                                <tr key={perf.id}>
                                                    <td>{perf.project}</td>
                                                    <td>{perf.amount}</td>
                                                    <td>{perf.year}</td>
                                                    <td>{perf.owner}</td>
                                                    <td>
                                                        <button className="btn btn-sm btn-outline">
                                                            <i className="fas fa-eye"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== 主应用 ====================
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => Storage.get('isLoggedIn', false));
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [user] = useState(() => Storage.get('user', { name: '用户' }));

            const handleLogin = () => {
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                Storage.set('isLoggedIn', false);
                Storage.set('user', null);
                setIsLoggedIn(false);
            };

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard':
                        return <Dashboard onNavigate={setCurrentPage} />;
                    case 'parse':
                        return <ParsePage />;
                    case 'writing':
                        return <WritingPage />;
                    case 'check':
                        return <CheckPage />;
                    case 'projects':
                        return <ProjectsPage />;
                    case 'company':
                        return <CompanyPage />;
                    default:
                        return <Dashboard onNavigate={setCurrentPage} />;
                }
            };

            if (!isLoggedIn) {
                return <LoginPage onLogin={handleLogin} />;
            }

            return (
                <div className="app-container">
                    <Sidebar
                        currentPage={currentPage}
                        onNavigate={setCurrentPage}
                        user={user}
                    />
                    <div className="main-content">
                        <Header currentPage={currentPage} />
                        <div className="page-content">
                            {renderPage()}
                        </div>
                    </div>
                </div>
            );
        };

        // 渲染应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
